name: Keep Render Awake

# Mantém o backend no Render (plano free) acordado, evitando cold start.
# O Render free dorme após 15 min sem requisições; pingamos /health a cada 10 min.

on:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10 minutos
  workflow_dispatch:           # permite rodar manualmente também

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          echo "Pingando backend para mantê-lo acordado..."
          curl -sS -m 60 -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" \
            https://drx-agent.onrender.com/health || echo "Ping falhou (backend acordando)"
