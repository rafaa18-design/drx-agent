# =============================================================================
# Asani AI Agent Template - Docker Compose
# =============================================================================
# Agent service with local Redis and Cloudflare Tunnel
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Agent Service
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
